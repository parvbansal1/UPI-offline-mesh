# ─────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────
server.port=8080

# ─────────────────────────────────────────────
# PostgreSQL  (Docker: localhost:5432)
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/upimesh
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─────────────────────────────────────────────
# Redis  (Docker: localhost:6379)
# ─────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ─────────────────────────────────────────────
# Kafka  (Docker EXTERNAL listener: localhost:9092)
# ─────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# Ensure delivery before returning (acks=all for safety)
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# Consumer
spring.kafka.consumer.group-id=upimesh-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
# Prevent consumer from blocking startup if Kafka is briefly unavailable
spring.kafka.consumer.properties.reconnect.backoff.ms=1000
spring.kafka.consumer.properties.reconnect.backoff.max.ms=10000
spring.kafka.consumer.properties.retry.backoff.ms=1000
# Stop infinite redelivery: max 3 attempts, then send to a dead-letter log
spring.kafka.listener.ack-mode=record

# ─── Kafka listener error handling / retry ───
# After 3 failures, log and skip (no infinite loop)
spring.kafka.listener.missing-topics-fatal=false

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging.level.com.demo.upimesh=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ─────────────────────────────────────────────
# UPI Mesh custom settings
# ─────────────────────────────────────────────
upi.mesh.idempotency-ttl-seconds=86400
upi.mesh.packet-max-age-seconds=86400
